<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 2.5D Bedroom Scene</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="container">
        <canvas id="scene-canvas"></canvas>
    </div>
    <div id="controls">
        <h2>Lighting Controls</h2>
        <div>
            <label for="ceiling-light-toggle">Ceiling Light:</label>
            <input type="checkbox" id="ceiling-light-toggle" checked>
            <input type="range" id="ceiling-light-intensity" min="0" max="0.5" step="0.01" value="0.5">
        </div>
        <div>
            <label for="left-lamp-toggle">Left Bedside Lamp:</label>
            <input type="checkbox" id="left-lamp-toggle" checked>
            <input type="range" id="left-lamp-intensity" min="0" max="0.5" step="0.01" value="0.75">
        </div>
        <div>
            <label for="right-lamp-toggle">Right Bedside Lamp:</label>
            <input type="checkbox" id="right-lamp-toggle" checked>
            <input type="range" id="right-lamp-intensity" min="0" max="0.5" step="0.01" value="0.75">
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
